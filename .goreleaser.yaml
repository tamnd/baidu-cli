version: 2

project_name: baidu

before:
  hooks:
    - go mod download

builds:
  - id: baidu
    binary: baidu
    main: ./cmd/baidu
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/tamnd/baidu-cli/cli.Version={{ .Version }}
      - -X github.com/tamnd/baidu-cli/cli.Commit={{ .ShortCommit }}
      - -X github.com/tamnd/baidu-cli/cli.Date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    targets:
      - linux_amd64
      - linux_arm64
      - linux_arm_7
      - linux_386
      - darwin_amd64
      - darwin_arm64
      - windows_amd64
      - windows_arm64
      - freebsd_amd64
      - freebsd_arm64

archives:
  - id: default
    name_template: "baidu_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

nfpms:
  - id: linux-packages
    package_name: baidu
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: tamnd
    homepage: https://github.com/tamnd/baidu-cli
    maintainer: Duc-Tam Nguyen <tamnd87@gmail.com>
    description: A command line for Baidu.
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk

dockers_v2:
  - images:
      - ghcr.io/tamnd/baidu
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "A command line for Baidu."
      org.opencontainers.image.url: "https://github.com/tamnd/baidu-cli"
      org.opencontainers.image.source: "https://github.com/tamnd/baidu-cli"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.licenses: "Apache-2.0"

homebrew_casks:
  - name: baidu
    repository:
      owner: tamnd
      name: homebrew-tap
      token: '{{ envOrDefault "HOMEBREW_TAP_GITHUB_TOKEN" "" }}'
    directory: Casks
    homepage: https://github.com/tamnd/baidu-cli
    description: A command line for Baidu.
    skip_upload: '{{ if envOrDefault "HOMEBREW_TAP_GITHUB_TOKEN" "" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Duc-Tam Nguyen
      email: tamnd87@gmail.com

scoops:
  - repository:
      owner: tamnd
      name: scoop-bucket
      token: '{{ envOrDefault "SCOOP_BUCKET_GITHUB_TOKEN" "" }}'
    homepage: https://github.com/tamnd/baidu-cli
    description: A command line for Baidu.
    license: Apache-2.0
    skip_upload: '{{ if envOrDefault "SCOOP_BUCKET_GITHUB_TOKEN" "" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Duc-Tam Nguyen
      email: tamnd87@gmail.com

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: archive
    artifacts: archive

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    artifacts: manifests
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: tamnd
    name: baidu-cli
  draft: false
  prerelease: auto
